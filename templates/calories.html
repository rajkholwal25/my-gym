{% extends "base.html" %}
{% block title %}Calories{% endblock %}
{% block content %}
<section class="page-header">
  <h1>Calorie Calculator</h1>
  <p>Estimate your daily calorie needs based on weight, height, age, and activity.</p>
</section>

<div class="calories-form-wrap">
  <form class="calories-form" id="calories-form">
    <label>
      Weight (kg)
      <input type="number" id="cal-weight" min="30" max="200" value="70" step="0.1" />
    </label>
    <label>
      Height (cm)
      <input type="number" id="cal-height" min="100" max="250" value="170" />
    </label>
    <label>
      Age
      <input type="number" id="cal-age" min="10" max="100" value="30" />
    </label>
    <label>
      Activity level
      <select id="cal-activity">
        <option value="1.2">Sedentary</option>
        <option value="1.375">Light (1–3 days/week)</option>
        <option value="1.55" selected>Moderate (3–5 days/week)</option>
        <option value="1.725">Active (6–7 days/week)</option>
        <option value="1.9">Very active</option>
      </select>
    </label>
    <label>
      <input type="radio" name="cal-sex" value="male" checked /> Male
    </label>
    <label>
      <input type="radio" name="cal-sex" value="female" /> Female
    </label>
    <button type="submit" class="btn btn-primary">Calculate</button>
  </form>
  <div class="calories-result hidden" id="calories-result">
    <h3>Daily maintenance</h3>
    <p class="big-number" id="cal-maintenance">—</p>
    <p>kcal/day</p>
    <p class="hint">For muscle gain: +300–500 above. For fat loss: -300–500 below.</p>
  </div>
</div>
{% endblock %}
