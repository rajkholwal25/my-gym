{% extends "base.html" %}
{% block title %}BMI{% endblock %}
{% block content %}
<section class="page-header">
  <h1>BMI Calculator</h1>
  <p>Calculate your Body Mass Index using your height and weight.</p>
</section>

<div class="bmi-form-wrap">
  <form class="bmi-form" id="bmi-form">
    <label>
      Weight (kg)
      <input type="number" id="bmi-weight" min="30" max="200" value="70" step="0.1" />
    </label>
    <label>
      Height (cm)
      <input type="number" id="bmi-height" min="100" max="250" value="170" />
    </label>
    <button type="submit" class="btn btn-primary">Calculate BMI</button>
  </form>
  <div class="bmi-result hidden" id="bmi-result">
    <h3>Your BMI</h3>
    <p class="big-number" id="bmi-value">—</p>
    <p id="bmi-category">—</p>
  </div>
</div>
{% endblock %}
